<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./main.css">
</head>

<body>

    <div class="app-container">
        <div class="search-section">
            <div class="search-bar">
                <svg class="search-icon" viewBox="0 0 16 16" width="16" height="16">
                    <path
                        d="M10.68 11.74a6 6 0 111.06-1.06l3.91 3.91a.75.75 0 11-1.06 1.06l-3.91-3.91zM12 7a5 5 0 10-10 0 5 5 0 0010 0z">
                    </path>
                </svg>
                <input id="usernameInput" type="text" placeholder="GitHub-dan qidiring...">
                <button class="search-btn ">Qidirish</button>
            </div>
        </div>

        <div id="profile-card" class="gh-profile-card">
            <div class="banner"></div>
            <div class="content">
                <div class="main-info">
                    <img src="https://github.com/identicons/jason.png" alt="User" class="avatar-large">
                    <div class="text-info">
                        <h1>Dasturchi Ismi</h1>
                        <p class="username">@dev_uzbekistan</p>
                    </div>
                </div>

                <p class="user-bio">Full-stack developer. Open source ixlosmandi. Bugun yozgan kodim ertaga dunyoni
                    o'zgartiradi. 🚀</p>

                <div class="stats-grid">
                    <div class="stat-box">
                        <span class="num">84</span>
                        <span class="label">Postlar</span>
                    </div>
                    <div class="stat-box">
                        <span class="num">1.2k</span>
                        <span class="label">Obunachilar</span>
                    </div>
                    <div class="stat-box">
                        <span class="num">150</span>
                        <span class="label">Obunalar</span>
                    </div>
                </div>
            </div>
        </div>


    </div>



    <script src="./js/main.js"></script>
</body>

</html>
